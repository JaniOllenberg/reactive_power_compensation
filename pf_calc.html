<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reactive Power Calculator</title>
    <link rel="stylesheet" href="shared_theme.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #2c3e50; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-left: 5px solid #3498db; border-radius: 4px; }
        .formula { font-family: monospace; font-size: 0.9em; color: #666; margin-top: 10px; }
        span.unit { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="card">
    <h2>PF Correction Calculator</h2>
    
    <div class="input-group">
        <label>Real Power (kW)</label>
        <input type="number" id="power" value="10" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>Current Power Factor (cos φ1)</label>
        <input type="number" id="pf1" value="0.70" step="0.01" min="0" max="1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>Target Power Factor (cos φ2)</label>
        <input type="number" id="pf2" value="0.95" step="0.01" min="0" max="1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>Voltage (V - RMS)</label>
        <input type="number" id="voltage" value="230" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>Frequency (Hz)</label>
        <input type="number" id="freq" value="50" oninput="calculate()">
    </div>

    <div class="result-box" id="results">
        <div>Required Q<sub>c</sub>: <span id="qc" class="unit">0</span> kVAR</div>
        <div>Required Capacitance: <span id="farads" class="unit">0</span> µF</div>
    </div>

    <div class="formula">
        C = Q<sub>c</sub> / (2π * f * V²)
    </div>
</div>

<script>
function calculate() {
    const P = parseFloat(document.getElementById('power').value) * 1000; // Convert kW to W
    const pf1 = parseFloat(document.getElementById('pf1').value);
    const pf2 = parseFloat(document.getElementById('pf2').value);
    const V = parseFloat(document.getElementById('voltage.value'));
    const f = parseFloat(document.getElementById('freq').value);
    const v = parseFloat(document.getElementById('voltage').value);

    if (pf1 > 0 && pf2 > 0 && v > 0) {
        // 1. Find angles
        const phi1 = Math.acos(pf1);
        const phi2 = Math.acos(pf2);

        // 2. Calculate Required Reactive Power (VAR)
        const Qc = P * (Math.tan(phi1) - Math.tan(phi2));
        
        // 3. Calculate Capacitance in Farads
        // Formula: C = Qc / (2 * PI * f * V^2)
        const C = Qc / (2 * Math.PI * f * Math.pow(v, 2));

        document.getElementById('qc').innerText = (Qc / 1000).toFixed(2);
        document.getElementById('farads').innerText = (C * 1000000).toFixed(2); // Show in microFarads
    }
}
// Initial call
calculate();
</script>

<script src="shared_ui.js"></script>
</body>
</html>
